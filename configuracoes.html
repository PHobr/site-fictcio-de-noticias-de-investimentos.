<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Configurações - IndexInvesting.com</title>
</head>
<body>
    <header class="banner">
        <div class="overlay">
                  <!-- NOME DO SITE -->
      <div class="site-logo">
        <span class="site-logo-icone">📈</span>
        <span class="site-logo-nome">IndexInvesting<span class="site-logo-com">.com</span></span>
      </div>

      <nav class="hero-menu">
                <ul>
                    <li><a href="index.html">Início</a></li>
                    <li><a href="#criadores">Criadores</a></li>
                    <li><a href="favoritos.html">⭐ Favoritos</a></li>
                    <li><a href="configuracoes.html">Configurações</a></li>
                    <li><a href="perfil.html">Perfil</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="configurações">
            <h2>Configurações do Sistema</h2>

            <div class="config-item">
                <h3>Tema</h3>
                <label>
                    <input type="checkbox" id="darkMode"> Modo Escuro
                </label>
            </div>

            <div class="config-item">
                <h3>Notificações</h3>
                <label>
                    <input type="checkbox" checked> Ativar notificações
                </label>
            </div>

            <div class="config-item">
                <h3>Idioma</h3>
                <select>
                    <option>Português (Brasil)</option>
                    <option>English</option>
                    <option>Español</option>
                </select>
            </div>

            <button class="config-btn" id="btnSalvar">Salvar Configurações</button>
            <p class="config-salvo hidden" id="msgSalvo">✔ Configurações salvas!</p>
        </section>
    </main>

    <footer class="footer">
        <span>© 2026 IndexInvesting.com</span>
        <span>- Todos os direitos reservados.</span>
    </footer>

    <script>
        const chkDark  = document.getElementById('darkMode');
        const btnSalvar = document.getElementById('btnSalvar');
        const msgSalvo  = document.getElementById('msgSalvo');

        // Ao carregar a página, lê o localStorage e aplica o tema salvo
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
            chkDark.checked = true;
        }

        // Quando o checkbox muda, aplica/remove o dark mode na hora
        chkDark.addEventListener('change', function () {
            document.body.classList.toggle('dark', this.checked);
        });

        // Salva a preferência e mostra mensagem de confirmação
        btnSalvar.addEventListener('click', function () {
            localStorage.setItem('darkMode', chkDark.checked);
            msgSalvo.classList.remove('hidden');
            setTimeout(() => msgSalvo.classList.add('hidden'), 2500);
        });
    </script>
</body>
</html>
