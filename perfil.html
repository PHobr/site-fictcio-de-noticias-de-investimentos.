    <script>
      const chkDark  = document.getElementById('darkMode');
      const btnSalvar = document.getElementById('btnSalvar');
      const msgSalvo  = document.getElementById('msgSalvo');

      // Ao carregar a página, lê o localStorage e aplica o tema salvo
      if (localStorage.getItem('darkMode') === 'true') {
          document.body.classList.add('dark');
          chkDark.checked = true;
      }

      // Quando o checkbox muda, aplica/remove o dark mode na hora
      chkDark.addEventListener('change', function () {
          document.body.classList.toggle('dark', this.checked);
      });

      // Salva a preferência e mostra mensagem de confirmação
      btnSalvar.addEventListener('click', function () {
          localStorage.setItem('darkMode', chkDark.checked);
          msgSalvo.classList.remove('hidden');
          setTimeout(() => msgSalvo.classList.add('hidden'), 2500);
      });
  </script>
